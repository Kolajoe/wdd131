<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Share your experience with our products by completing this product review form. Your feedback helps us improve quality and service.">
    <meta name="author" content="Jonathan KOLA MONGENGO">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>
    <main>
        <form action="review.html" method="get" id="review-form">
            <div class="form-group">
                <label for="product-name">Product Name <span class="required">*</span></label>
                <select id="product-name" name="productName" required>
                    <option value="" disable selected>Select a Product ...</option>
                </select>
                <label class="rating-label">Overall Rating<span class="required">*</span></label> 
                <div class="rating-container">
                    <div class="rating-option">
                        <input type="radio" id="rating-1" name="rating" value="1" required>
                        <label for="rating-1">☆ 1</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating-2" name="rating" value="2" required>
                        <label for="rating-2">☆☆ 2</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating-3" name="rating" value="3" required>
                        <label for="rating-3">☆☆☆ 3</label>
                    </div>
                    <div class="rating-option">
                        <input type="radio" id="rating-4" name="rating" value="4" required>
                        <label for="rating-4">☆☆☆☆ 4</label>
                    </div>
                     <div class="rating-option">
                        <input type="radio" id="rating-5" name="rating" value="5" required>
                        <label for="rating-5">☆☆☆☆☆ 5</label>
                     </div>
                </div>
            </div>

            <div class="form-group">
                <label for="install-date">Date of Installation<span class="required">*</span></label>
                <input type="date" id="install-date" name="installDate" required>
            </div>

            <div class="form-group">
                <label>Useful Features</label>
                <div class="checkbox-group">
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature1" name="features" value="Ease of Use">
                        <label for="feature1">Ease of Use</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature2" name="features" value="Performance">
                        <label for="feature2">Performance</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature3" name="features" value="Durability">
                        <label for="feature3">Durability</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature4" name="features" value="Design">
                        <label for="feature4">Design</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature5" name="features" value="Customer Support">
                        <label for="feature5">Customer Support</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature6" name="features" value="Value for Money">
                        <label for="feature6">Value for Money</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="review">Written Review</label>
                <textarea id="review" name="review" rows="5" placeholder="Share your experience with this product..."></textarea>
            </div>

            <div class="form-group">
                <label for="username">User Name</label>
                <input type="text" id="username" name="userName" placeholder="Enter your name (optional)">
            </div>

            <div class="form-group">
                <input type="submit" value="Submit Review" class="submit-btn">
            </div>
        </form>
    </main>

    <footer>
        <p>© <span id="current-year"></span> Jonathan KOLA MONGENGO - Kinshasa, DR Congo CD</p>
        <p><span id="last-modified">📅 Last Modified:</p>
    </footer>
    
</body>
</html>
